name: Advanced Site Monitor

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check Health Endpoint (status + latency + keyword)
        id: check
        shell: bash
        run: |
          set +e

          URL="https://airocode.com/healthz"
          KEYWORD='"ok":true'
          TIMEOUT="15"
          SLOW_MS="6000"

          # Capture body + http code + total time
          BODY=$(curl -sS --max-time "$TIMEOUT" -w "\n__HTTP_CODE:%{http_code}\n__TIME_TOTAL:%{time_total}\n" "$URL")
          CURL_EXIT=$?

          HTTP_CODE=$(echo "$BODY" | sed -n 's/__HTTP_CODE:\(.*\)/\1/p' | tail -n 1 | tr -d '\r')
          TIME_TOTAL=$(echo "$BODY" | sed -n 's/__TIME_TOTAL:\(.*\)/\1/p' | tail -n 1 | tr -d '\r')
          CONTENT=$(echo "$BODY" | sed '/__HTTP_CODE:/,$d')

          # seconds -> ms (best effort)
          if [ -n "$TIME_TOTAL" ]; then
            TIME_MS=$(awk "BEGIN {print int($TIME_TOTAL * 1000)}")
          else
            TIME_MS=0
          fi

          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "time_ms=$TIME_MS" >> "$GITHUB_OUTPUT"

          RESULT="ok"
          REASON="OK"

          if [ "$CURL_EXIT" -ne 0 ] || [ -z "$HTTP_CODE" ]; then
            RESULT="down"
            REASON="curl failed/timeout (exit=$CURL_EXIT)"
          elif [ "$HTTP_CODE" != "200" ]; then
            RESULT="down"
            REASON="HTTP $HTTP_CODE"
          else
            # Keyword check (detect wrong page / HTML / stuck)
            echo "$CONTENT" | grep -q "$KEYWORD"
            if [ $? -ne 0 ]; then
              RESULT="degraded"
              REASON="Keyword missing"
            fi
          fi

          # Slow check (even if ok/degraded)
          if [ "$TIME_MS" -gt "$SLOW_MS" ] && [ "$RESULT" = "ok" ]; then
            RESULT="degraded"
            REASON="Slow response ${TIME_MS}ms"
          fi

          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Send result to Laravel ingest endpoint
        shell: bash
        run: |
          curl -sS -X POST "https://airocode.com/monitor/ingest" \
            -H "Content-Type: application/json" \
            -H "X-Monitor-Secret: ${{ secrets.MONITOR_SECRET }}" \
            -d '{
              "source":"github_actions",
              "target":"airocode_healthz",
              "url":"https://airocode.com",
              "result":"${{ steps.check.outputs.result }}",
              "http_code":"${{ steps.check.outputs.http_code }}",
              "latency_ms":${{ steps.check.outputs.time_ms }},
              "reason":"${{ steps.check.outputs.reason }}"
            }'

            # curl -sS -X POST "https://airocode.com/monitor/ingest" \
            # -H "Content-Type: application/json" \
            # -H "X-Monitor-Secret: ${{ secrets.MONITOR_SECRET }}" \
            # -d '{
            #   "source":"github_actions",
            #   "target":"airocode_healthz",
            #   "url":"https://airocode.com/healthz",
            #   "result":"${{ steps.check.outputs.result }}",
            #   "http_code":"${{ steps.check.outputs.http_code }}",
            #   "latency_ms":${{ steps.check.outputs.time_ms }},
            #   "reason":"${{ steps.check.outputs.reason }}"
            # }'
